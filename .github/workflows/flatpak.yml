name: Build and Publish Flatpak Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flatpak and Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Runtimes
        run: |
          flatpak install --user -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build and Export All Apps
        run: |
          # Create the repo directory at the root
          mkdir -p ${{ github.workspace }}/repo

          # Find all .yml or .yaml files, excluding the workflow folder
          # Format: folder/manifest.yml
          for manifest in $(find . -maxdepth 2 -name "*.y*ml" -not -path "./.github/*"); do
            echo "----------------------------------------------------"
            echo "Processing $manifest"
            echo "----------------------------------------------------"
            
            # Get the directory and filename
            APP_DIR=$(dirname "$manifest")
            APP_FILE=$(basename "$manifest")
            
            # Enter the subdirectory so the builder sees the .desktop and script files
            cd "$APP_DIR"
            
            flatpak-builder --force-clean \
                            --repo=${{ github.workspace }}/repo \
                            --gpg-sign=6E3AD62F511CE60A95692755684C5851F7E7829C \
                            build-dir "$APP_FILE"
            
            # Go back to root for the next iteration
            cd ${{ github.workspace }}
          done
          
          # After all apps are built, update the main repository summary
          flatpak build-update-repo --gpg-sign=6E3AD62F511CE60A95692755684C5851F7E7829C repo
        env:
          # This helps some GPG versions find the agent in CI
          GPG_TTY: /dev/pts/0

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: repo
          branch: gh-pages
