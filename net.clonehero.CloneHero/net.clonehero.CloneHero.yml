app-id: net.clonehero.CloneHero
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: clonehero.sh
build-options:
  no-debuginfo: true

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=all
  - --socket=pulseaudio
  - --filesystem=xdg-documents/Clone Hero:create

modules:
  - name: clonehero
    buildsystem: simple
    build-commands:
      # Create the folder structure
      - mkdir -p /app/bin /app/extra /app/share/applications
      
      # Copy everything from the archive to /app/extra
      - cp -r . /app/extra/
      
      # Overwrite/Install the script and desktop file to their proper locations
      - install -Dpm0755 clonehero.sh /app/bin/clonehero.sh
      - install -Dpm0644 net.clonehero.CloneHero.desktop /app/share/applications/net.clonehero.CloneHero.desktop
      
      # Clean up the redundant copies from /app/extra
      - rm /app/extra/clonehero.sh /app/extra/net.clonehero.CloneHero.desktop

    sources:
      # 1. The game binary and assets
      - type: archive
        url: https://github.com/clonehero-game/releases/releases/download/v1.1.0.6085-final/Linux.x86_64-Standalone.tar
        sha256: c72effdd20cd80ac3aee2900ec2b5154ada036b7e3ab1e1c4c379152491204aa
      
      # 2. The external desktop entry file
      - type: file
        path: net.clonehero.CloneHero.desktop
      
      # 3. The startup wrapper script
      - type: script
        dest-filename: clonehero.sh
        commands:
          - exec "/app/extra/Clone Hero" "$@"
