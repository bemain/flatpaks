app-id: net.clonehero.CloneHero
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: clonehero.sh
build-options:
  no-debuginfo: true

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=all
  - --socket=pulseaudio
  - --persist=.clonehero
  - --filesystem=xdg-documents/Clone Hero:create

modules:
  - name: clonehero
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/clonehero
      
      # Copy game files to /app/lib/clonehero
      - cp -r . /app/lib/clonehero/
      # Remove the default songs; I don't know any of them
      - rm -r /app/lib/clonehero/clonehero_Data/StreamingAssets/songs

      # Fix permissions
      - chmod +x /app/lib/clonehero/clonehero
      
      # Install the script and desktop file
      - install -Dpm0755 clonehero.sh /app/bin/clonehero.sh
      - install -Dpm0644 net.clonehero.CloneHero.desktop /app/share/applications/net.clonehero.CloneHero.desktop


    sources:
      # The game binary and assets
      - type: archive
        url: https://github.com/clonehero-game/releases/releases/download/v1.1.0.6085-final/Linux.x86_64-Standalone.tar
        sha256: c72effdd20cd80ac3aee2900ec2b5154ada036b7e3ab1e1c4c379152491204aa
      
      # The external desktop entry file
      - type: file
        path: net.clonehero.CloneHero.desktop
      
      # The startup wrapper script
      - type: script
        dest-filename: clonehero.sh
        commands:
          - |
            INTERNAL_DATA="$HOME/.clonehero"
            INTERNAL_SONGS="$INTERNAL_DATA/Songs"
            EXTERNAL_SONGS="$HOME/Documents/Clone Hero/Songs"

            mkdir -p "$INTERNAL_SONGS"

            # Symlink external songs if the directory exists
            if [ -d "$EXTERNAL_SONGS" ]; then
                ln -snf "$EXTERNAL_SONGS" "$INTERNAL_SONGS/My_Documents_Songs"
            else
                rm -f "$INTERNAL_SONGS/My_Documents_Songs"
            fi
            
            exec "/app/lib/clonehero/clonehero" "$@"
